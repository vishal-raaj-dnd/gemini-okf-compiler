name: Build OKF Knowledge Bundle

on:
  push:
    branches:
      - main
    paths:
      - 'documents/**.md'
      - 'raw_input.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-okf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run OKF Compiler
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Example: compile raw_input.md to the root-level .okf/ directory
          if [ -f "raw_input.md" ]; then
            python main.py --input raw_input.md --output-dir .okf
          else
            echo "No raw_input.md file found. Skipping compilation."
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .okf/
          if git diff --staged --quiet; then
            echo "No changes in OKF bundle."
          else
            git commit -m "chore: auto-generate OKF knowledge catalog [skip ci]"
            git push
          fi
